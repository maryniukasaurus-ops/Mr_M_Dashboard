<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for dense look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen font-sans transition-colors duration-200">

    <!-- TOP HEADER -->
    <header class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-4">
            
            <!-- Logo & Title -->
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center text-white font-bold shadow-md shadow-emerald-500/20">
                    D
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-none tracking-tight">Dashboard</h1>
                    <span class="text-xs text-slate-500 dark:text-slate-400">Workspace & Teaching Hub</span>
                </div>
            </div>

            <!-- Global Search & Tab Selectors -->
            <div class="flex items-center gap-3 flex-1 max-w-md md:justify-center">
                <!-- Tab Buttons -->
                <div class="bg-slate-100 dark:bg-slate-800 p-1 rounded-xl flex items-center w-full sm:w-auto">
                    <button id="tab-links-btn" onclick="switchTab('links')" class="flex-1 sm:flex-initial px-4 py-1.5 text-xs font-semibold rounded-lg transition-all duration-150 bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white">
                        Links
                    </button>
                    <button id="tab-schedule-btn" onclick="switchTab('schedule')" class="flex-1 sm:flex-initial px-4 py-1.5 text-xs font-semibold rounded-lg transition-all duration-150 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white">
                        Schedule
                    </button>
                </div>

                <!-- Instant Filter Input (Links view only) -->
                <div id="search-container" class="relative hidden sm:block w-48 lg:w-64">
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Quick filter..." 
                        oninput="filterLinks(this.value)"
                        class="w-full bg-slate-100 dark:bg-slate-800 text-xs px-3 py-2 pl-8 rounded-lg border-none focus:ring-1 focus:ring-emerald-500 focus:outline-none"
                    />
                    <svg class="w-3.5 h-3.5 absolute left-2.5 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>

            <!-- Top Right Fun Corner: Audio Player & Minesweeper Activator -->
            <div class="flex items-center gap-3">
                
                <!-- Sleek Audio Player Widget -->
                <div class="flex items-center gap-1 bg-slate-100 dark:bg-slate-800 p-1 rounded-xl border border-slate-200/50 dark:border-slate-700/50">
                    <select id="audio-select" onchange="changeAudioSource()" class="bg-transparent text-sm focus:outline-none pl-1 pr-1 cursor-pointer dark:bg-slate-800 rounded">
                        <option value="jazz">🎷</option>
                        <option value="house">🏠</option>
                        <option value="sound">🌧️</option>
                    </select>
                    <button id="audio-play-btn" onclick="toggleAudio()" class="w-7 h-7 flex items-center justify-center rounded-lg bg-emerald-500 text-white hover:scale-105 active:scale-95 transition-transform" title="Play/Pause Focus Music">
                        <!-- Play Icon -->
                        <svg id="play-icon" class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>
                        </svg>
                        <!-- Pause Icon -->
                        <svg id="pause-icon" class="w-3.5 h-3.5 hidden" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                        </svg>
                    </button>
                </div>

                <!-- Minesweeper Button -->
                <button onclick="toggleMinesweeperModal()" class="p-2 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 transition-colors group flex items-center justify-center" title="Play Minesweeper">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-emerald-500 group-hover:scale-110 transition-transform">
                      <path d="M22 12c0-3.313-2.687-6-6-6H8c-3.313 0-6 2.687-6 6s2.687 6 6 6h8c3.313 0 6-2.687 6-6zm-13 1H7v2H6v-2H4v-1h2V9h1v3h2v1zm4-1.5c-.828 0-1.5-.672-1.5-1.5s.672-1.5 1.5-1.5 1.5.672 1.5 1.5-.672 1.5-1.5 1.5zm3 3c-.828 0-1.5-.672-1.5-1.5s.672-1.5 1.5-1.5 1.5.672 1.5 1.5-.672 1.5-1.5 1.5z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN BODY CONTAINER -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- Tab 1: Links (Grid / Bento Layout) -->
        <div id="tab-links-content" class="transition-opacity duration-200">
            <!-- Mobile Search Bar -->
            <div class="block sm:hidden mb-4 relative">
                <input 
                    type="text" 
                    placeholder="Quick filter..." 
                    oninput="filterLinks(this.value)"
                    class="w-full bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 text-sm px-3 py-2.5 pl-9 rounded-lg focus:ring-1 focus:ring-emerald-500 focus:outline-none shadow-sm"
                />
                <svg class="w-4 h-4 absolute left-3 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>

            <!-- Dynamic Bento Box Container -->
            <div id="links-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- JS dynamically injects category card blocks here -->
            </div>
        </div>

        <!-- Tab 2: Schedule (Professional Day View) -->
        <div id="tab-schedule-content" class="hidden opacity-0 transition-opacity duration-200">
            <!-- Active Day Quick Navigation -->
            <div class="flex items-center gap-2 overflow-x-auto pb-4 mb-4 border-b border-slate-200 dark:border-slate-800 scrollbar-none" id="schedule-day-nav">
                <!-- Inject Day Selectors here dynamically -->
            </div>

            <!-- Timetable Display Container -->
            <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-800 flex flex-wrap items-center justify-between gap-2">
                    <h3 class="font-bold text-base flex items-center gap-2">
                        <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                        <span id="active-day-title">Today's Teaching Schedule</span>
                    </h3>
                    <span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-400 border border-emerald-200/50 dark:border-emerald-800/30">
                        Academic Term
                    </span>
                </div>
                <div class="divide-y divide-slate-100 dark:divide-slate-800/50" id="schedule-timeline">
                    <!-- Dynamic timeline rows injected here -->
                </div>
            </div>
        </div>

    </main>

    <!-- MINESWEEPER POPUP MODAL -->
    <div id="minesweeper-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-2xl max-w-sm w-full relative">
            
            <!-- Modal Header -->
            <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <h3 class="font-bold text-sm">Retro Minesweeper</h3>
                </div>
                <button onclick="toggleMinesweeperModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-lg">&times;</button>
            </div>

            <!-- Game Engine Bar -->
            <div class="flex items-center justify-between bg-slate-100 dark:bg-slate-950 p-2.5 rounded-xl border border-slate-200/50 mb-4 font-mono text-sm font-semibold select-none">
                <!-- Mine Counter -->
                <div class="text-red-500" id="mine-counter">🚩 010</div>
                <!-- Restart Face Icon Button -->
                <button onclick="initMinesweeper()" class="hover:scale-110 active:scale-95 transition-transform text-lg" id="ms-face-btn">😊</button>
                <!-- Game Timer -->
                <div class="text-emerald-500" id="ms-timer">⏱️ 000</div>
            </div>

            <!-- Game Matrix Board -->
            <div id="minesweeper-grid" class="grid grid-cols-9 gap-1 aspect-square bg-slate-200 dark:bg-slate-950 p-1.5 rounded-xl border border-slate-200 dark:border-slate-800/50 mb-3 overflow-hidden select-none">
                <!-- Grid Cells injected here dynamically by Javascript -->
            </div>

            <!-- Mobile Controls / Actions Toggle -->
            <div class="flex items-center justify-between gap-2 mt-4">
                <button onclick="initMinesweeper()" class="flex-1 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-800 dark:text-slate-200 text-xs font-semibold py-2 rounded-xl border border-slate-200/50 transition-colors">
                    Reset Game
                </button>
                
                <!-- Tool Selector Switch: Reveal (Bomb) vs Flag (Marker) -->
                <div class="bg-slate-100 dark:bg-slate-800 p-0.5 rounded-xl flex items-center border border-slate-200 dark:border-slate-700/50">
                    <button id="ms-mode-dig" onclick="setMSMode('dig')" class="px-3 py-1.5 text-xs font-semibold rounded-lg bg-emerald-500 text-white transition-all shadow-sm flex items-center gap-1">
                        💣
                    </button>
                    <button id="ms-mode-flag" onclick="setMSMode('flag')" class="px-3 py-1.5 text-xs font-semibold rounded-lg text-slate-500 dark:text-slate-400 transition-all flex items-center gap-1">
                        🚩
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="mt-12 mb-6 text-center text-xs text-slate-400 dark:text-slate-600">
        <p>Press <kbd class="px-1.5 py-0.5 bg-slate-200 dark:bg-slate-800 rounded">Esc</kbd> or <kbd class="px-1.5 py-0.5 bg-slate-200 dark:bg-slate-800 rounded">/</kbd> to search/filter. Single-file responsive Link Dashboard.</p>
    </footer>

            schedule: [
                {
                    day: "Monday",
                    classes: [
                        { time: "09:00 AM - 10:30 AM", course: "CS 101: Intro to Programming", room: "Tech Hall 203", type: "Lecture" },

                    ]

                    classes: [

                    ]
                }
            ]
        };

        // AUDIO CONTEXT SOURCES (Fixed CORS/Hotlinking restrictions for rain sound loop)
        const AUDIO_SOURCES = {
            jazz: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', // Relaxing synth/jazz-style lounge loop
            house: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3', // Upbeat deep-chill focus house rhythm
            sound: 'https://raw.githubusercontent.com/rafaelreis-hotmart/Rain-Sound/master/rain.mp3' // High-quality loopable rain sound
        };

        let bgAudio = null;
        let isAudioPlaying = false;

        // Track Current UI State
        let currentTab = 'links';
        let currentScheduleDay = '';

        // Initialize App on DOM Ready
        window.addEventListener('DOMContentLoaded', () => {
            // Apply theme as dark automatically
            document.documentElement.classList.add('dark');

            // Render Links & Schedules
            renderLinks();
            setupScheduleNav();

            // Setup Focus Audio Node
            bgAudio = new Audio(AUDIO_SOURCES.jazz);
            bgAudio.loop = true;

            // Set Initial Schedule Day (default to current weekday, or Monday if weekend)
            const daysMap = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const currentDayName = daysMap[new Date().getDay()];
            const hasSchedule = DASHBOARD_DATA.schedule.some(s => s.day.toLowerCase() === currentDayName.toLowerCase());
            
            if (hasSchedule) {
                selectScheduleDay(currentDayName);
            } else {
                // Default to first day in data
                selectScheduleDay(DASHBOARD_DATA.schedule[0]?.day || "Monday");
            }

            // Keyboard Shortcuts
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    const msModal = document.getElementById('minesweeper-modal');
                    if (!msModal.classList.contains('hidden')) {
                        toggleMinesweeperModal();
                    } else {
                        const s = document.getElementById('search-input');
                        s.value = '';
                        filterLinks('');
                        s.blur();
                    }
                } else if (e.key === '/' && document.activeElement !== document.getElementById('search-input')) {
                    e.preventDefault();
                    switchTab('links');
                    const s = document.getElementById('search-input');
                    s.focus();
                }
            });

            // Init backend logic for Minesweeper
            initMinesweeper();
        });

        // Toggle Focus Ambient Audio
        function toggleAudio() {
            if (!bgAudio) return;
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');

            if (isAudioPlaying) {
                bgAudio.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                isAudioPlaying = false;
            } else {
                bgAudio.play().then(() => {
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                    isAudioPlaying = true;
                }).catch(err => {
                    console.log("Audio play blocked by browser interaction policies: ", err);
                });
            }
        }

        // Handle Audio track changing
        function changeAudioSource() {
            if (!bgAudio) return;
            const selectedVal = document.getElementById('audio-select').value;
            const newSrc = AUDIO_SOURCES[selectedVal];

            bgAudio.pause();
            bgAudio.src = newSrc;

            if (isAudioPlaying) {
                bgAudio.play().catch(err => console.log(err));
            }
        }

        // Tab Switching Logic
        function switchTab(tab) {
            currentTab = tab;
            const linksBtn = document.getElementById('tab-links-btn');
            const schedBtn = document.getElementById('tab-schedule-btn');
            
            const linksContent = document.getElementById('tab-links-content');
            const schedContent = document.getElementById('tab-schedule-content');
            const searchContainer = document.getElementById('search-container');

            if (tab === 'links') {
                linksBtn.className = "flex-1 sm:flex-initial px-4 py-1.5 text-xs font-semibold rounded-lg transition-all duration-150 bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white";
                schedBtn.className = "flex-1 sm:flex-initial px-4 py-1.5 text-xs font-semibold rounded-lg transition-all duration-150 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white";
                
                linksContent.classList.remove('hidden');
                setTimeout(() => linksContent.classList.remove('opacity-0'), 50);

        // Live Link Filter functionality (Updated for collapsible sub-group layout)
        function filterLinks(query) {
            const cleanQuery = query.toLowerCase().trim();
            const categoryCards = document.querySelectorAll('#links-grid > div');

            categoryCards.forEach((card) => {
                const linkElements = card.querySelectorAll('.link-item-card');
                let visibleLinksCount = 0;

                linkElements.forEach((link) => {
                    const title = link.getAttribute('data-title');
                    const subtitle = link.getAttribute('data-subtitle');

                    if (title.includes(cleanQuery) || subtitle.includes(cleanQuery)) {
                        link.classList.remove('hidden');
                        visibleLinksCount++;
                    } else {
                        link.classList.add('hidden');
                    }
                });

                // Dynamically hide/show empty sub-group containers when filtering
                const subGroups = card.querySelectorAll('.bento-sub-group');
                subGroups.forEach((group) => {
                    const activeGroupLinks = group.querySelectorAll('.link-item-card:not(.hidden)');
                    const grid = group.querySelector('.group-links-grid');
                    const arrowIcon = group.querySelector('.arrow-icon');
                    
                    if (activeGroupLinks.length === 0 && cleanQuery !== '') {
                        group.classList.add('hidden');
                    } else {
                        group.classList.remove('hidden');
                        
                        // Smart Search Expand: Automatically force-expand groups if there is an active search query matching items inside it
                        if (cleanQuery !== '') {
                            grid.classList.remove('hidden');
                            if (arrowIcon) {
                                arrowIcon.classList.remove('-rotate-90');
                            }
                        }
                    }
                });

                // Dynamically handle Card-Level Collapsible Expansion on Filter match
                const collapsibleBodies = card.querySelectorAll('.card-collapsible-body');
                collapsibleBodies.forEach((body) => {
                    const activeCardLinks = body.querySelectorAll('.link-item-card:not(.hidden)');
                    const arrowIcon = card.querySelector('.card-arrow-icon');
                    
                    if (activeCardLinks.length > 0 && cleanQuery !== '') {
                        body.classList.remove('hidden');
                        if (arrowIcon) {
                            arrowIcon.classList.remove('-rotate-90');
                        }
                    } else if (cleanQuery === '') {
                        // Standard collapsed state when search cleared
                        body.classList.add('hidden');
                        if (arrowIcon) {
                            arrowIcon.classList.add('-rotate-90');
                        }
                    }
                });

                // Hide complete Bento category block if no links match query
                if (visibleLinksCount === 0 && cleanQuery !== '') {
                    card.classList.add('hidden');
                } else {
                    card.classList.remove('hidden');
                }
            });
        }

        function setupScheduleNav() {

        // Change displayed schedule day
        function selectScheduleDay(dayName) {
            currentScheduleDay = dayName;
            
            // Set title
            document.getElementById('active-day-title').innerText = `${dayName}'s Teaching Schedule`;

            // Style active navigation pill
            DASHBOARD_DATA.schedule.forEach((dayData) => {
                const btn = document.getElementById(`day-btn-${dayData.day}`);
                if (btn) {
                    if (dayData.day === dayName) {
                        btn.className = "px-3 py-1.5 text-xs font-semibold rounded-lg bg-emerald-500 text-white shrink-0 shadow-sm shadow-emerald-500/20";
                    } else {
                        btn.className = "px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors shrink-0";
                    }
                }
            });

            // Find data for selected day and render timeline
            const dayData = DASHBOARD_DATA.schedule.find(s => s.day === dayName);
            const timelineContainer = document.getElementById('schedule-timeline');
            timelineContainer.innerHTML = '';

            if (dayData && dayData.classes.length > 0) {
                dayData.classes.forEach((c) => {
                    const row = document.createElement('div');
                    row.className = "p-4 sm:p-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 hover:bg-slate-50 dark:hover:bg-slate-800/20 transition-colors";

                    // Determine Type Badge colors
                    let typeBadgeClass = "bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300";
                    if (c.type === 'Lecture') {
                        typeBadgeClass = "bg-blue-50 text-blue-700 dark:bg-blue-950/40 dark:text-blue-400 border border-blue-200/50 dark:border-blue-800/20";
                    } else if (c.type === 'Lab') {
                        typeBadgeClass = "bg-purple-50 text-purple-700 dark:bg-purple-950/40 dark:text-purple-400 border border-purple-200/50 dark:border-purple-800/20";
                    } else if (c.type === 'Office Hours') {
                        typeBadgeClass = "bg-emerald-50 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-400 border border-emerald-200/50 dark:border-emerald-800/20";
                    }

                    row.innerHTML = `
                        <div class="flex items-center gap-4">
                            <!-- Left Marker/Dot -->
                            <div class="hidden sm:flex w-2.5 h-2.5 rounded-full bg-slate-300 dark:bg-slate-700 relative items-center justify-center">
                                <span class="absolute w-1 h-1 bg-white rounded-full"></span>
                            </div>
                            
                            <!-- Class details -->
                            <div>
                                <span class="text-xs font-mono font-bold text-emerald-500 block mb-0.5">${c.time}</span>
                                <h4 class="font-bold text-sm sm:text-base text-slate-800 dark:text-slate-100 leading-tight">${c.course}</h4>
                            </div>
                        </div>

                        <!-- Right Info Blocks (Room & Type) -->
                        <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
                            <span class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1.5 font-medium">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                                ${c.room}
                            </span>
                            <span class="text-[10px] tracking-wider font-extrabold uppercase px-2 py-1 rounded-md ${typeBadgeClass}">
                                ${c.type}
                            </span>
                        </div>
                    `;
                    timelineContainer.appendChild(row);
                });
            } else {
                timelineContainer.innerHTML = `
                    <div class="p-8 text-center text-slate-400 dark:text-slate-500">
                        <svg class="w-8 h-8 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <p class="text-xs font-semibold">No classes scheduled for ${dayName}.</p>
                    </div>
                `;
            }
        }

        /***********************************************************
         * RETRO MINESWEEPER LOGIC & ENGINE
         ***********************************************************/
        const MS_COLS = 9;
        const MS_ROWS = 9;
        const MS_MINES = 10;

        let msBoard = [];
        let msGameOver = false;
        let msGameWon = false;
        let msMinesRemaining = MS_MINES;
        let msSeconds = 0;
        let msTimerInterval = null;
        let msFirstClick = true;
        let msInputMode = 'dig'; // 'dig' or 'flag'

        // Toggle modal visible
        function toggleMinesweeperModal() {
            const modal = document.getElementById('minesweeper-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                // Resume game timer if active
                if (!msGameOver && !msGameWon && msSeconds > 0 && !msFirstClick) {
                    startMSTimer();
                }
            } else {
                modal.classList.add('hidden');
                // Auto-pause timer when modal closes to protect CPU & save game state
                clearInterval(msTimerInterval);
            }
        }

        // Toggle mobile tool mode (Dig vs Flag)
        function setMSMode(mode) {
            msInputMode = mode;
            const digBtn = document.getElementById('ms-mode-dig');
            const flagBtn = document.getElementById('ms-mode-flag');
            if (mode === 'dig') {
                digBtn.className = "px-3 py-1.5 text-xs font-semibold rounded-lg bg-emerald-500 text-white transition-all shadow-sm flex items-center gap-1";
                flagBtn.className = "px-3 py-1.5 text-xs font-semibold rounded-lg text-slate-500 dark:text-slate-400 transition-all flex items-center gap-1";
            } else {
                flagBtn.className = "px-3 py-1.5 text-xs font-semibold rounded-lg bg-emerald-500 text-white transition-all shadow-sm flex items-center gap-1";
                digBtn.className = "px-3 py-1.5 text-xs font-semibold rounded-lg text-slate-500 dark:text-slate-400 transition-all flex items-center gap-1";
            }
        }

        // Initialize board
        function initMinesweeper() {
            clearInterval(msTimerInterval);
            msGameOver = false;
            msGameWon = false;
            msFirstClick = true;
            msSeconds = 0;
            msMinesRemaining = MS_MINES;
            msBoard = [];

            document.getElementById('mine-counter').innerText = `🚩 ${String(msMinesRemaining).padStart(3, '0')}`;
            document.getElementById('ms-timer').innerText = `⏱️ 000`;
            document.getElementById('ms-face-btn').innerText = `😊`;

            // Build structural grid matrix
            for (let r = 0; r < MS_ROWS; r++) {
                msBoard[r] = [];
                for (let c = 0; c < MS_COLS; c++) {
                    msBoard[r][c] = {
                        row: r,
                        col: c,
                        isMine: false,
                        isRevealed: false,
                        isFlagged: false,
                        neighborMinesCount: 0
                    };
                }
            }

            renderMSBoard();
        }

        // Render dynamic board onto DOM
        function renderMSBoard() {
            const gridContainer = document.getElementById('minesweeper-grid');
            gridContainer.innerHTML = '';

            for (let r = 0; r < MS_ROWS; r++) {
                for (let c = 0; c < MS_COLS; c++) {
                    const cellData = msBoard[r][c];
                    const cellBtn = document.createElement('button');
                    
                    // Default closed state classes
                    let cellClasses = "aspect-square flex items-center justify-center text-xs font-black rounded-lg border focus:outline-none transition-all duration-75 select-none ";
                    
                    if (cellData.isRevealed) {
                        cellClasses += "bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-700/60 ";
                        if (cellData.isMine) {
                            cellClasses += "bg-red-500 dark:bg-red-500/80 ";
                            cellBtn.innerText = "💣";
                        } else if (cellData.neighborMinesCount > 0) {
                            cellBtn.innerText = cellData.neighborMinesCount;
                            // Retro number color palette
                            const colors = [
                                'text-blue-500', 'text-green-500', 'text-red-500', 
                                'text-purple-500', 'text-amber-500', 'text-cyan-500', 
                                'text-pink-500', 'text-slate-500'
                            ];
                            cellClasses += colors[cellData.neighborMinesCount - 1] + " ";
                        }
                    } else {
                        cellClasses += "bg-white dark:bg-slate-900 border-slate-200/80 dark:border-slate-800 shadow-sm active:bg-slate-100 dark:active:bg-slate-800/80 ";
                        if (cellData.isFlagged) {
                            cellBtn.innerText = "🚩";
                            cellClasses += "text-red-500 ";
                        }
                    }

                    cellBtn.className = cellClasses;
                    
                    // Primary click (Sweeping/Revealing or Flagging if toggle mode is on)
                    cellBtn.onclick = (e) => {
                        e.preventDefault();
                        if (msInputMode === 'flag') {
                            handleRightClick(r, c);
                        } else {
                            handleLeftClick(r, c);
                        }
                    };

                    // Context Menu Flag toggle (Native Right Click)
                    cellBtn.oncontextmenu = (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    };

                    gridContainer.appendChild(cellBtn);
                }
            }
        }

        // Generate and place mines (first click logic avoids planting mine where user clicked)
        function generateMines(excludeRow, excludeCol) {
            let minesPlaced = 0;
            while (minesPlaced < MS_MINES) {
                const r = Math.floor(Math.random() * MS_ROWS);
                const c = Math.floor(Math.random() * MS_COLS);

                // Avoid placing on first click tile or overlapping existing mine
                if ((r !== excludeRow || c !== excludeCol) && !msBoard[r][c].isMine) {
                    msBoard[r][c].isMine = true;
                    minesPlaced++;
                }
            }

            // Calculate adjacent neighbor metrics
            for (let r = 0; r < MS_ROWS; r++) {
                for (let c = 0; c < MS_COLS; c++) {
                    if (!msBoard[r][c].isMine) {
                        let count = 0;
                        // Search 8 directions
                        for (let i = -1; i <= 1; i++) {
                            for (let j = -1; j <= 1; j++) {
                                if (r + i >= 0 && r + i < MS_ROWS && c + j >= 0 && c + j < MS_COLS) {
                                    if (msBoard[r + i][c + j].isMine) count++;
                                }
                            }
                        }
                        msBoard[r][c].neighborMinesCount = count;
                    }
                }
            }
        }

        // Start Stopwatch
        function startMSTimer() {
            clearInterval(msTimerInterval);
            msTimerInterval = setInterval(() => {
                msSeconds++;
                if (msSeconds > 999) msSeconds = 999;
                document.getElementById('ms-timer').innerText = `⏱️ ${String(msSeconds).padStart(3, '0')}`;
            }, 1000);
        }

        // Handle sweeps (left click)
        function handleLeftClick(row, col) {
            if (msGameOver || msGameWon) return;

            const cell = msBoard[row][col];
            if (cell.isRevealed || cell.isFlagged) return;

            if (msFirstClick) {
                msFirstClick = false;
                generateMines(row, col);
                startMSTimer();
            }

            if (cell.isMine) {
                // Game Over state triggered
                triggerLoss(row, col);
                return;
            }

            revealCellRecursively(row, col);
            checkWinState();
            renderMSBoard();
        }

        // Recursive flood fill to open adjacent empty cells
        function revealCellRecursively(row, col) {
            if (row < 0 || row >= MS_ROWS || col < 0 || col >= MS_COLS) return;
            const cell = msBoard[row][col];
            if (cell.isRevealed || cell.isFlagged || cell.isMine) return;

            cell.isRevealed = true;

            // Cascade reveal if no adjacent mines exist
            if (cell.neighborMinesCount === 0) {
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        revealCellRecursively(row + i, col + j);
                    }
                }
            }
        }

        // Toggle Flag (right click or mobile toggle)
        function handleRightClick(row, col) {
            if (msGameOver || msGameWon) return;

            const cell = msBoard[row][col];
            if (cell.isRevealed) return;

            cell.isFlagged = !cell.isFlagged;
            msMinesRemaining += cell.isFlagged ? -1 : 1;
            document.getElementById('mine-counter').innerText = `🚩 ${String(msMinesRemaining).padStart(3, '0')}`;

            renderMSBoard();
        }

        // Verify if all clear tiles are open
        function checkWinState() {
            let win = true;
            for (let r = 0; r < MS_ROWS; r++) {
                for (let c = 0; c < MS_COLS; c++) {
                    const cell = msBoard[r][c];
                    if (!cell.isMine && !cell.isRevealed) {
                        win = false;
                        break;
                    }
                }
            }

            if (win) {
                msGameWon = true;
                clearInterval(msTimerInterval);
                document.getElementById('ms-face-btn').innerText = `😎`;
                
                // Flag remaining hidden mines automatically
                for (let r = 0; r < MS_ROWS; r++) {
                    for (let c = 0; c < MS_COLS; c++) {
                        if (msBoard[r][c].isMine) {
                            msBoard[r][c].isFlagged = true;
                        }
                    }
                }
                msMinesRemaining = 0;
                document.getElementById('mine-counter').innerText = `🚩 000`;
            }
        }

        // Trigger defeat and expose other mines
        function triggerLoss(clickedRow, clickedCol) {
            msGameOver = true;
            clearInterval(msTimerInterval);
            document.getElementById('ms-face-btn').innerText = `😵`;

            // Reveal all hidden mines
            for (let r = 0; r < MS_ROWS; r++) {
                for (let c = 0; c < MS_COLS; c++) {
                    const cell = msBoard[r][c];
                    if (cell.isMine) {
                        cell.isRevealed = true;
                    }
                }
            }
            renderMSBoard();
        }
    </script>
</body>
